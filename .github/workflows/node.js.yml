# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.JS CI

on:
  push:
    branches: [ master ]
  pull_request_target:
    branches: [ master ]

jobs:

  # ─── Job 1: runs PR code, NO secrets, NO write permissions ───────────────
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [20.x, 22.x, 24.x]

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
    - run: yarn install
    - run: yarn format
    - run: yarn build
    - run: yarn test:ci
    - uses: actions/upload-artifact@v6
      if: matrix.node-version == '20.x'
      with:
        name: reports-${{ matrix.os }}-${{ matrix.node-version }}
        retention-days: 1
        path: |
          **/coverage/lcov.info
          **/coverage/sonar-report.xml
          !node_modules/**

  # ─── Job 2: uploads coverage using secrets, does NOT run PR code ─────────
  static_analysis:
    name: "🔬 Static Analysis"
    needs: build
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: read
    steps:
    # Commit is needed to check coverage files against content
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
        # Disabling shallow clone is needed by SonarQube
        fetch-depth: 0
    - uses: actions/download-artifact@v8
      with:
        pattern: reports-*
        path: __reports
    - run: find __reports -type f
    - name: Collect Sonar report paths
      id: sonar_reports
      run: |
        echo "test_reports=$(find . -name "sonar-report.xml" | tr '\n' ',' | sed 's/,$//')" >> $GITHUB_OUTPUT
        echo "project_version=$(git tag -l --sort=-creatordate --format='%(refname:short)' | head -n1)" >> $GITHUB_OUTPUT
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v7
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.testExecutionReportPaths=${{ steps.sonar_reports.outputs.test_reports }}
          -Dsonar.projectVersion=`${{ steps.sonar_reports.outputs.project_version  }}`
