name: NPM Publish

on:
  release:
    types: [created]

jobs:
  publish-npm:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - run: yarn install
      - run: yarn build
      - run: yarn test
      - name: Publish all non-private packages
        run: |
          yarn workspaces foreach \
            --all \
            --no-private \
            --topological \
            npm publish
